<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸計算機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&family=Yuji+Boku&family=Shippori+Mincho:wght@600;800&family=Zen+Kaku+Gothic+New:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0a0a0d; --paper:#f1ecdf; --gold:#d9b24a;
    --jade:#1f6f4f; --jade-dark:#0c1f16;
    /* Apple 按鈕灰階 */
    --num-1:#4c4c50; --num-2:#39393d;
    --fn-1:#bcbcc0;  --fn-2:#a3a3a8; --fn-text:#161617;
    /* 預設：炎之呼吸（橘） */
    --accent-1:#ff9f0a; --accent-2:#ff7a18; --accent-3:#c2470b;
    --glow:rgba(255,140,40,.55); --op-text:#fff;
    --brush:'Yuji Syuku','Shippori Mincho',serif;
  }
  .b-water { --accent-1:#3aa7e0; --accent-2:#1c5e9e; --accent-3:#0e3a63; --glow:rgba(58,167,224,.55); --op-text:#eaf6ff; }
  .b-thunder{ --accent-1:#ffe14d; --accent-2:#f4b41a; --accent-3:#a36b00; --glow:rgba(255,210,60,.6);  --op-text:#3a2400; }
  .b-wind  { --accent-1:#46c08a; --accent-2:#1f7a55; --accent-3:#0c3d29; --glow:rgba(70,192,138,.55); --op-text:#eafff5; }
  .b-mist  { --accent-1:#b39ddb; --accent-2:#7e57c2; --accent-3:#4a2f7a; --glow:rgba(150,110,220,.55);--op-text:#f6f0ff; }
  .b-love  { --accent-1:#ff9ec0; --accent-2:#e85d8a; --accent-3:#a83366; --glow:rgba(255,120,170,.55);--op-text:#fff2f7; }

  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #241015 0%, transparent 55%),
      radial-gradient(100% 60% at 50% 110%, #0c1a24 0%, transparent 55%),
      var(--ink);
    color:var(--paper);
    min-height:100%; display:flex; align-items:center; justify-content:center;
    padding:28px 16px; overflow-x:hidden; position:relative;
  }
  body::before{
    content:""; position:fixed; inset:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,140,60,.5), transparent),
      radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,90,40,.4), transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, rgba(255,170,90,.35), transparent),
      radial-gradient(2px 2px at 85% 25%, rgba(255,120,50,.4), transparent);
    animation:drift 9s linear infinite; pointer-events:none; opacity:.55;
  }
  @keyframes drift{ from{transform:translateY(0);} to{transform:translateY(-30px);} }

  .frame{
    position:relative; width:min(360px,100%);
    background:repeating-conic-gradient(var(--jade) 0% 25%, var(--jade-dark) 0% 50%) 0 0 / 40px 40px;
    border-radius:22px; padding:18px;
    box-shadow:0 0 0 1px rgba(217,178,74,.35), 0 30px 70px rgba(0,0,0,.75), inset 0 0 0 4px rgba(0,0,0,.3);
    overflow:hidden;
  }
  .frame::before{
    content:""; position:absolute; inset:0;
    background:radial-gradient(120% 120% at 50% 0%, rgba(0,0,0,.18), rgba(0,0,0,.66) 80%);
    pointer-events:none;
  }
  .frame > *{ position:relative; z-index:1; }

  .title{
    font-family:'Yuji Boku','Yuji Syuku',serif; letter-spacing:.16em;
    font-size:24px; text-align:center; color:#fff; margin:2px 0;
    text-shadow:0 2px 10px rgba(0,0,0,.8), 0 0 16px var(--glow);
  }
  .subtitle{
    font-family:'Yuji Syuku',serif; text-align:center; font-size:12px;
    letter-spacing:.35em; color:var(--gold); text-shadow:0 1px 4px rgba(0,0,0,.9); margin-bottom:10px;
  }

  .breaths{ display:flex; gap:6px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .breaths button{
    font-family:var(--brush); font-size:17px;
    width:34px; height:34px; border:1px solid rgba(217,178,74,.3); border-radius:9px;
    background:rgba(10,10,14,.7); color:rgba(241,236,223,.72); cursor:pointer;
    transition:all .18s ease; -webkit-tap-highlight-color:transparent;
  }
  .breaths button:hover{ color:#fff; border-color:rgba(217,178,74,.6); }
  .breaths button.on{
    color:#fff; border-color:transparent; text-shadow:0 1px 2px rgba(0,0,0,.55);
    background:linear-gradient(180deg,var(--bp1),var(--bp2));
    box-shadow:0 0 14px var(--bpg), inset 0 1px 0 rgba(255,255,255,.3);
  }
  .breaths button[data-breath="flame"]  { --bp1:#ff9f0a; --bp2:#ff7a18; --bpg:rgba(255,140,40,.6); }
  .breaths button[data-breath="water"]  { --bp1:#3aa7e0; --bp2:#1c5e9e; --bpg:rgba(58,167,224,.6); }
  .breaths button[data-breath="thunder"]{ --bp1:#ffe14d; --bp2:#f4b41a; --bpg:rgba(255,210,60,.6); }
  .breaths button[data-breath="wind"]   { --bp1:#46c08a; --bp2:#1f7a55; --bpg:rgba(70,192,138,.6); }
  .breaths button[data-breath="mist"]   { --bp1:#b39ddb; --bp2:#7e57c2; --bpg:rgba(150,110,220,.6); }
  .breaths button[data-breath="love"]   { --bp1:#ff9ec0; --bp2:#e85d8a; --bpg:rgba(255,120,170,.6); }

  .screen{
    position:relative;
    background:radial-gradient(120% 100% at 80% 0%, var(--glow), transparent 60%), linear-gradient(180deg,#0c0c11,#070709);
    border:1px solid rgba(217,178,74,.35); border-radius:14px; padding:16px 18px;
    margin-bottom:16px; overflow:hidden;
    box-shadow:0 6px 18px rgba(0,0,0,.6), inset 0 0 30px rgba(0,0,0,.6);
  }
  .screen::after{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.06),transparent);
    transform:skewX(-18deg); animation:slash-idle 7s ease-in-out infinite;
  }
  @keyframes slash-idle{ 0%,72%{left:-60%;} 88%,100%{left:140%;} }
  .history{
    min-height:22px; text-align:right; font-family:var(--brush);
    font-size:16px; color:rgba(241,236,223,.5); letter-spacing:.06em; word-break:break-all; line-height:1.4;
  }
  .result{
    text-align:right; font-family:var(--brush); font-size:42px;
    line-height:1.2; margin-top:6px; word-break:break-all; color:#fff;
    text-shadow:0 2px 16px var(--glow); transition:transform .08s ease, font-size .12s ease; letter-spacing:.03em;
  }
  .result.fx{ animation:ink-bleed .95s cubic-bezier(.22,.7,.18,1); }
  @keyframes ink-bleed{
    0%   { filter:blur(7px); opacity:.35; transform:scale(1.16);
           color:#c7bfae; text-shadow:0 0 26px rgba(0,0,0,.95), 0 0 13px rgba(6,6,8,.95); }
    25%  { filter:blur(3.5px); opacity:.7; transform:scale(1.09); color:#d8d0bf; }
    55%  { filter:blur(1.4px); transform:scale(1.03); color:#ece5d5; }
    100% { filter:blur(0); opacity:1; transform:scale(1);
           color:#fff; text-shadow:0 2px 16px var(--glow); }
  }

  .grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  button.key{
    font-family:var(--brush); font-size:27px; color:#fff;
    border:none; border-radius:16px; padding:17px 0; cursor:pointer; position:relative;
    background:linear-gradient(180deg,var(--num-1),var(--num-2));
    box-shadow:0 2px 6px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.08);
    transition:transform .06s ease, filter .12s ease; user-select:none; -webkit-tap-highlight-color:transparent;
  }
  button.key:active{ transform:scale(.95); filter:brightness(1.2); }
  button.key:hover{ filter:brightness(1.1); }
  .span2{ grid-column:span 2; }

  /* 功能鍵：淺灰深字（Apple） */
  .key.fn{
    font-size:20px; color:var(--fn-text);
    background:linear-gradient(180deg,var(--fn-1),var(--fn-2));
    box-shadow:0 2px 6px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.45);
  }
  /* 運算鍵：呼吸法配色 */
  .key.op{
    color:var(--op-text);
    background:linear-gradient(180deg,var(--accent-1),var(--accent-2) 60%,var(--accent-3));
    box-shadow:0 2px 8px rgba(0,0,0,.4), 0 0 16px var(--glow), inset 0 1px 0 rgba(255,255,255,.28);
  }
  /* 等於：日輪 */
  .key.equals{
    color:var(--op-text);
    background:radial-gradient(circle at 50% 32%, #ffffff 0%, var(--accent-1) 36%, var(--accent-2) 74%, var(--accent-3));
    box-shadow:0 2px 10px rgba(0,0,0,.4), 0 0 22px var(--glow), inset 0 1px 0 rgba(255,255,255,.45);
  }

  .footnote{
    text-align:center; font-family:'Yuji Syuku',serif; font-size:11px; letter-spacing:.3em;
    color:rgba(217,178,74,.75); text-shadow:0 1px 3px rgba(0,0,0,.9); margin-top:14px;
  }

  /* 全屏斬擊 */
  .slash-fx{ position:absolute; inset:0; pointer-events:none; z-index:5; opacity:0; }
  .slash-fx .blade{
    position:absolute; top:-40%; left:-40%; width:180%; height:16px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.98) 47%, #fff 50%, rgba(255,255,255,.98) 53%, transparent);
    box-shadow:0 0 24px 10px var(--glow), 0 0 70px 22px var(--glow);
    transform:rotate(-32deg) translateX(-130%); filter:blur(.4px);
  }
  .slash-fx .blade.b2{ height:9px; box-shadow:0 0 18px 7px rgba(255,255,255,.6), 0 0 56px 18px var(--glow); }
  .slash-fx .flash{
    position:absolute; inset:0; opacity:0;
    background:radial-gradient(circle at 68% 36%, rgba(255,255,255,.9), var(--glow) 38%, transparent 72%);
  }
  .frame.cut .slash-fx{ animation:fx-show .62s ease forwards; }
  .frame.cut .slash-fx .blade{  animation:blade-cut .40s cubic-bezier(.18,.85,.1,1) forwards; }
  .frame.cut .slash-fx .blade.b2{ animation:blade-cut2 .48s .05s cubic-bezier(.18,.85,.1,1) forwards; }
  .frame.cut .slash-fx .flash{ animation:flash .5s ease forwards; }
  @keyframes fx-show{ 0%{opacity:1;} 100%{opacity:0;} }
  @keyframes blade-cut{ 0%{transform:rotate(-32deg) translateX(-130%);opacity:0;} 16%{opacity:1;} 100%{transform:rotate(-32deg) translateX(130%);opacity:0;} }
  @keyframes blade-cut2{ 0%{transform:rotate(34deg) translateX(-130%);opacity:0;} 16%{opacity:1;} 100%{transform:rotate(34deg) translateX(130%);opacity:0;} }
  @keyframes flash{ 0%{opacity:0;} 12%{opacity:1;} 100%{opacity:0;} }
</style>
</head>
<body>
  <div class="frame" id="frame">
    <div class="slash-fx" id="slashfx">
      <div class="flash"></div>
      <div class="blade"></div>
      <div class="blade b2"></div>
    </div>

    <div class="title">全集中・計算</div>
    <div class="subtitle">壹ノ型　四則演算</div>

    <div class="breaths" id="breaths">
      <button class="on" data-breath="flame">炎</button>
      <button data-breath="water">水</button>
      <button data-breath="thunder">雷</button>
      <button data-breath="wind">風</button>
      <button data-breath="mist">霞</button>
      <button data-breath="love">戀</button>
    </div>

    <div class="screen">
      <div class="history" id="history">&nbsp;</div>
      <div class="result" id="result">零</div>
    </div>

    <div class="grid">
      <button class="key fn" data-action="clear">重置</button>
      <button class="key fn" data-action="del">後退</button>
      <button class="key fn" data-action="percent">百分</button>
      <button class="key op" data-op="/">除</button>

      <button class="key" data-num="7">七</button>
      <button class="key" data-num="8">八</button>
      <button class="key" data-num="9">九</button>
      <button class="key op" data-op="*">乘</button>

      <button class="key" data-num="4">四</button>
      <button class="key" data-num="5">五</button>
      <button class="key" data-num="6">六</button>
      <button class="key op" data-op="-">減</button>

      <button class="key" data-num="1">一</button>
      <button class="key" data-num="2">二</button>
      <button class="key" data-num="3">三</button>
      <button class="key op" data-op="+">加</button>

      <button class="key span2" data-num="0">零</button>
      <button class="key" data-action="dot">點</button>
      <button class="key equals" data-action="equals">等於</button>
    </div>

    <div class="footnote">心、燃やせ</div>
  </div>

<script>
(function(){
  const resultEl  = document.getElementById('result');
  const historyEl = document.getElementById('history');
  const frame     = document.getElementById('frame');
  const breaths   = document.getElementById('breaths');

  let current='0', stored=null, op=null, justEval=false;

  const cnNum  = ['零','一','二','三','四','五','六','七','八','九'];
  const cnUnit = ['','十','百','千'];
  const cnBig  = ['','萬','億','兆','京','垓'];
  const opCn   = {'+':'加','-':'減','*':'乘','/':'除'};

  function sectionToCn(sec){
    sec=('0000'+sec).slice(-4);
    let str='', lastZero=false, started=false;
    for(let i=0;i<4;i++){
      const d=parseInt(sec[i],10), unitPos=3-i;
      if(d===0){ if(started) lastZero=true; }
      else{ if(lastZero){ str+='零'; lastZero=false; } str+=cnNum[d]+cnUnit[unitPos]; started=true; }
    }
    return str;
  }
  function intToCn(numStr){
    numStr=numStr.replace(/^0+/,'')||'0';
    if(numStr==='0') return '零';
    let sections=[], s=numStr;
    while(s.length>0){ sections.unshift(s.slice(-4)); s=s.slice(0,-4); }
    let result='', pendingZero=false;
    for(let i=0;i<sections.length;i++){
      const sec=sections[i];
      const bigUnit=cnBig[sections.length-1-i]||'';
      const secVal=parseInt(sec,10);
      if(secVal===0){ pendingZero=(result!==''); }
      else{
        if(pendingZero){ result+='零'; pendingZero=false; }
        else if(result!=='' && ('0000'+sec).slice(-4)[0]==='0'){ result+='零'; }
        result += sectionToCn(sec) + bigUnit;
      }
    }
    if(result.indexOf('一十')===0) result='十'+result.slice(2);
    return result;
  }
  function cnDisplay(str){
    if(str==='Error') return '無限・斬';
    let neg=false;
    if(str.charAt(0)==='-'){ neg=true; str=str.slice(1); }
    let intPart, decPart=null;
    if(str.indexOf('.')!==-1){ const idx=str.indexOf('.'); intPart=str.slice(0,idx); decPart=str.slice(idx+1); }
    else intPart=str;
    if(intPart==='') intPart='0';
    let out=intToCn(intPart);
    if(decPart!==null){ out+='點'; for(let i=0;i<decPart.length;i++) out+=cnNum[parseInt(decPart[i],10)]; }
    return neg ? '負'+out : out;
  }
  function fitFont(text){
    const n=text.length;
    resultEl.style.fontSize = n<=5?'42px': n<=8?'32px': n<=12?'24px': n<=18?'18px':'15px';
  }
  let lastDisp=null;
  function inkBleed(){ resultEl.classList.remove('fx'); void resultEl.offsetWidth; resultEl.classList.add('fx'); }
  function render(){
    const disp=cnDisplay(current);
    resultEl.textContent=disp; fitFont(disp);
    if(disp!==lastDisp){ inkBleed(); lastDisp=disp; }   /* 數字更新時墨色暈染 */
    if(stored!==null && op){ historyEl.textContent=cnDisplay(String(stored))+' '+opCn[op]; }
  }
  function pulse(){ inkBleed(); }

  function inputNum(n){
    if(justEval){ current='0'; stored=null; op=null; historyEl.innerHTML='&nbsp;'; justEval=false; }
    current=(current==='0')?n:current+n; render(); pulse();
  }
  function inputDot(){
    if(justEval){ current='0'; stored=null; op=null; historyEl.innerHTML='&nbsp;'; justEval=false; }
    if(current.indexOf('.')===-1) current+='.'; render();
  }
  function chooseOp(nextOp){
    if(op && stored!==null && !justEval){ compute(); } else { stored=parseFloat(current); }
    op=nextOp; justEval=false; current='0';
    historyEl.textContent=cnDisplay(String(stored))+' '+opCn[op];
  }
  function compute(){
    if(op===null || stored===null) return;
    const a=stored, b=parseFloat(current); let r;
    switch(op){ case '+': r=a+b; break; case '-': r=a-b; break; case '*': r=a*b; break; case '/': r=b===0?'Error':a/b; break; }
    if(r==='Error'){ current='Error'; stored=null; }
    else { r=Math.round((r+Number.EPSILON)*1e10)/1e10; current=String(r); stored=r; }
  }
  function triggerSlash(){
    frame.classList.remove('cut'); void frame.offsetWidth; frame.classList.add('cut');
    setTimeout(function(){ frame.classList.remove('cut'); }, 660);
  }
  function equals(){
    if(op===null || stored===null) return;
    const expr=cnDisplay(String(stored))+' '+opCn[op]+' '+cnDisplay(current)+' 等於';
    compute();
    historyEl.textContent=(current==='Error')?'抜刀失敗':expr;
    op=null; justEval=true; render(); pulse(); triggerSlash();
  }
  function clearAll(){ current='0'; stored=null; op=null; justEval=false; historyEl.innerHTML='&nbsp;'; render(); }
  function del(){
    if(justEval){ clearAll(); return; }
    if(current.length<=1 || (current.length===2 && current.charAt(0)==='-')) current='0';
    else current=current.slice(0,-1);
    render();
  }
  function percent(){ current=String(parseFloat(current)/100); render(); }

  document.querySelector('.grid').addEventListener('click', function(e){
    const b=e.target.closest('button'); if(!b) return;
    if(b.dataset.num!==undefined) return inputNum(b.dataset.num);
    if(b.dataset.op!==undefined)  return chooseOp(b.dataset.op);
    switch(b.dataset.action){
      case 'clear': clearAll(); break;
      case 'del': del(); break;
      case 'percent': percent(); break;
      case 'dot': inputDot(); break;
      case 'equals': equals(); break;
    }
  });

  const breathClasses=['b-water','b-thunder','b-wind','b-mist','b-love'];
  breaths.addEventListener('click', function(e){
    const b=e.target.closest('button'); if(!b) return;
    breaths.querySelectorAll('button').forEach(function(x){ x.classList.remove('on'); });
    b.classList.add('on');
    frame.classList.remove.apply(frame.classList, breathClasses);
    const map={water:'b-water',thunder:'b-thunder',wind:'b-wind',mist:'b-mist',love:'b-love'};
    if(map[b.dataset.breath]) frame.classList.add(map[b.dataset.breath]);
    triggerSlash();  /* 切換呼吸法時順勢斬一下 */
  });

  window.addEventListener('keydown', function(e){
    const k=e.key;
    if(/\d/.test(k)) inputNum(k);
    else if(k==='.') inputDot();
    else if(['+','-','*','/'].indexOf(k)!==-1) chooseOp(k);
    else if(k==='Enter' || k==='='){ e.preventDefault(); equals(); }
    else if(k==='Backspace') del();
    else if(k==='Escape') clearAll();
    else if(k==='%') percent();
  });

  render();
})();
</script>
</body>
</html>
